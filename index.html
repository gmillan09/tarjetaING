<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Gabriel Millan — Gerente de Planta · CC Pilar EPEC</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d1b2e;
      font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
      padding: 2rem;
    }

    .card {
      background: #ffffff;
      border-radius: 16px;
      width: 100%;
      max-width: 540px;
      overflow: hidden;
      box-shadow: 0 24px 60px rgba(0, 0, 0, 0.45);
    }

    /* Header band */
    .card__header {
      background: #0d3a6e;
      padding: 2.4rem 2.4rem 1.8rem;
      position: relative;
    }

    .card__header::after {
      content: '';
      display: block;
      height: 4px;
      background: linear-gradient(90deg, #f5c400, #f5a800);
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
    }

    .card__logo-row {
      margin-bottom: 1.4rem;
    }

    .card__company {
      color: #ffffff;
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
    }

    .card__name {
      color: #ffffff;
      font-size: 2rem;
      font-weight: 700;
      letter-spacing: -0.02em;
      line-height: 1.1;
    }

    .card__role {
      color: #a8c4e0;
      font-size: 0.92rem;
      font-weight: 400;
      margin-top: 0.35rem;
      letter-spacing: 0.02em;
    }

    /* Contact list */
    .card__body {
      padding: 2rem 2.4rem;
      display: flex;
      flex-direction: column;
      gap: 1rem;
    }

    .contact-item {
      display: flex;
      align-items: center;
      gap: 0.9rem;
    }

    .contact-item__icon {
      width: 38px;
      height: 38px;
      border-radius: 50%;
      background: #eef3f9;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .contact-item__icon svg {
      width: 18px;
      height: 18px;
      color: #0d3a6e;
    }

    .contact-item__label {
      font-size: 0.7rem;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #8a9bb0;
      line-height: 1;
      margin-bottom: 2px;
    }

    .contact-item__value {
      font-size: 0.95rem;
      color: #1a2a3a;
      font-weight: 500;
      line-height: 1.2;
    }

    .contact-item__value a {
      color: #1a2a3a;
      text-decoration: none;
    }

    .contact-item__value a:hover {
      color: #0d3a6e;
      text-decoration: underline;
    }

    /* Email row with copy button */
    .email-row {
      display: flex;
      align-items: center;
      gap: 0.6rem;
      flex-wrap: wrap;
    }

    .btn-copy {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 4px 10px;
      border-radius: 6px;
      border: 1.5px solid #0d3a6e;
      background: transparent;
      color: #0d3a6e;
      font-size: 0.72rem;
      font-weight: 600;
      letter-spacing: 0.04em;
      cursor: pointer;
      transition: background 0.18s, color 0.18s;
      white-space: nowrap;
    }

    .btn-copy:hover {
      background: #0d3a6e;
      color: #ffffff;
    }

    .btn-copy.copied {
      background: #1a7a3a;
      border-color: #1a7a3a;
      color: #ffffff;
    }

    .btn-copy svg {
      width: 12px;
      height: 12px;
    }

    /* Divider */
    .card__divider {
      height: 1px;
      background: #e8edf3;
      margin: 0 2.4rem;
    }

    /* Footer */
    .card__footer {
      padding: 1rem 2.4rem 1.4rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .card__footer-text {
      font-size: 0.72rem;
      color: #b0bcc9;
      letter-spacing: 0.04em;
    }

    .linkedin-btn {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 6px 14px;
      border-radius: 8px;
      background: #0a66c2;
      color: #ffffff;
      font-size: 0.78rem;
      font-weight: 600;
      text-decoration: none;
      transition: background 0.18s;
    }

    .linkedin-btn:hover {
      background: #084e96;
    }

    .linkedin-btn svg {
      width: 14px;
      height: 14px;
    }

    /* QR section */
    .card__qr {
      padding: 1.4rem 2.4rem 1.8rem;
      display: flex;
      align-items: center;
      gap: 1.4rem;
      background: #f7f9fc;
      border-top: 1px solid #e8edf3;
    }

    .card__qr-box {
      flex-shrink: 0;
      width: 100px;
      height: 100px;
      background: #fff;
      border: 1px solid #dce4ef;
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
    }

    .card__qr-box canvas,
    .card__qr-box img {
      display: block;
    }

    .card__qr-text {
      flex: 1;
    }

    .card__qr-title {
      font-size: 0.75rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: #8a9bb0;
      margin-bottom: 4px;
    }

    .card__qr-desc {
      font-size: 0.85rem;
      color: #4a5a6a;
      line-height: 1.4;
    }
  </style>
</head>
<body>

<div class="card">

  <!-- Header -->
  <div class="card__header">
    <div class="card__logo-row">
      <span class="card__company">EPEC · CC Pilar</span>
    </div>
    <div class="card__name">Gabriel Millan</div>
    <div class="card__role">Gerente de Planta</div>
  </div>

  <!-- Contact info -->
  <div class="card__body">

    <!-- Email -->
    <div class="contact-item">
      <div class="contact-item__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="4" width="20" height="16" rx="2"/>
          <path d="M2 7l10 7 10-7"/>
        </svg>
      </div>
      <div>
        <div class="contact-item__label">Email</div>
        <div class="contact-item__value">
          <div class="email-row">
            <a href="mailto:gmillan@epec.com.ar">gmillan@epec.com.ar</a>
            <button class="btn-copy" id="copyBtn" onclick="copyEmail()">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <rect x="9" y="9" width="13" height="13" rx="2"/>
                <path d="M5 15H4a2 2 0 01-2-2V4a2 2 0 012-2h9a2 2 0 012 2v1"/>
              </svg>
              <span id="copyLabel">Copiar</span>
            </button>
          </div>
        </div>
      </div>
    </div>

    <!-- Phone -->
    <div class="contact-item">
      <div class="contact-item__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M22 16.92v3a2 2 0 01-2.18 2 19.8 19.8 0 01-8.63-3.07A19.5 19.5 0 013.07 10.8a19.8 19.8 0 01-3.07-8.67A2 2 0 012 0h3a2 2 0 012 1.72c.127.96.361 1.903.7 2.81a2 2 0 01-.45 2.11L6.09 7.91a16 16 0 006 6l1.27-1.27a2 2 0 012.11-.45c.907.339 1.85.573 2.81.7A2 2 0 0122 14.92v2z"/>
        </svg>
      </div>
      <div>
        <div class="contact-item__label">Teléfono</div>
        <div class="contact-item__value">
          <a href="tel:+543513489320">+54 351 348 9320</a>
        </div>
      </div>
    </div>

    <!-- Address -->
    <div class="contact-item">
      <div class="contact-item__icon">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M21 10c0 7-9 13-9 13S3 17 3 10a9 9 0 0118 0z"/>
          <circle cx="12" cy="10" r="3"/>
        </svg>
      </div>
      <div>
        <div class="contact-item__label">Dirección</div>
        <div class="contact-item__value">Ruta Prov. 13 Km 4,5 — CC Pilar</div>
      </div>
    </div>

  </div>

  <!-- QR Code -->
  <div class="card__qr">
    <div class="card__qr-box" id="qrcode"></div>
    <div class="card__qr-text">
      <div class="card__qr-title">Código QR</div>
      <div class="card__qr-desc">Escaneá para guardar el contacto directo en tu celular.</div>
    </div>
  </div>

  <div class="card__divider"></div>

  <!-- Footer -->
  <div class="card__footer">
    <span class="card__footer-text">Empresa Provincial de Energía de Córdoba</span>
    <a class="linkedin-btn" href="https://www.linkedin.com/in/gabriel-millan-60129534/" target="_blank" rel="noopener">
      <svg viewBox="0 0 24 24" fill="currentColor">
        <path d="M16 8a6 6 0 016 6v7h-4v-7a2 2 0 00-2-2 2 2 0 00-2 2v7h-4v-7a6 6 0 016-6zM2 9h4v12H2z"/>
        <circle cx="4" cy="4" r="2"/>
      </svg>
      LinkedIn
    </a>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
  var vcard = [
    'BEGIN:VCARD',
    'VERSION:3.0',
    'FN:Gabriel Millan',
    'ORG:EPEC;CC Pilar',
    'TITLE:Gerente de Planta',
    'EMAIL:gmillan@epec.com.ar',
    'TEL:+543513489320',
    'ADR:;;Ruta Prov. 13 Km 4\\,5;Pilar;;;Argentina',
    'URL:https://www.linkedin.com/in/gabriel-millan-60129534/',
    'END:VCARD'
  ].join('\n');

  new QRCode(document.getElementById('qrcode'), {
    text: vcard,
    width: 96,
    height: 96,
    colorDark: '#0d3a6e',
    colorLight: '#ffffff',
    correctLevel: QRCode.CorrectLevel.M
  });

  function copyEmail() {
    const email = 'gmillan@epec.com.ar';
    navigator.clipboard.writeText(email).then(function() {
      const btn = document.getElementById('copyBtn');
      const label = document.getElementById('copyLabel');
      btn.classList.add('copied');
      label.textContent = '¡Copiado!';
      setTimeout(function() {
        btn.classList.remove('copied');
        label.textContent = 'Copiar';
      }, 2000);
    });
  }
</script>

</body>
</html>
